# Telegraf Configuration
# Learn more: https://docs.influxdata.com/telegraf/

# Global agent settings
[agent]
  interval = "10s"           # Collect metrics every 10 seconds
  round_interval = true       # Round collection interval to 'interval'
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "0s"
  hostname = ""
  omit_hostname = false

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

# CPU Metrics - Percentage usage per CPU and total
[[inputs.cpu]]
  percpu = true           # Report per-CPU stats
  totalcpu = true         # Report total CPU stats
  collect_cpu_time = false
  report_active = false

# Memory Usage - RAM statistics
[[inputs.mem]]

# Disk Usage - Filesystem space usage
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

# Disk I/O - Read/write statistics
[[inputs.diskio]]

# System Load & Uptime
[[inputs.system]]

# Network Interface Statistics
[[inputs.net]]

# Network Protocol Statistics
[[inputs.netstat]]

# Process Count
[[inputs.processes]]

# Solar system planet data - outputs line protocol to stdout
[[inputs.exec]]
  commands = ["python3 /app/scripts/influxdb_example_solar.py"]
  interval = "1h"
  timeout = "10s"
  data_format = "influx"

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

# System metrics → atlas (excludes planet_stats)
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8181"]
  token = "${INFLUXDB_TOKEN}"
  organization = ""
  bucket = "atlas"
  namedrop = ["planet_stats"]

# Planet data → solar_system (only planet_stats)
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8181"]
  token = "${INFLUXDB_TOKEN}"
  organization = ""
  bucket = "solar_system"
  namepass = ["planet_stats"]